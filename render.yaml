services:
  - type: web
    name: romantic-hamilton
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_SITE_URL
        value: https://romantichamilton.store
      - key: NAVER_CALLBACK_BASE_URL
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
